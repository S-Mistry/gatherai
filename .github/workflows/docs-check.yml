name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            gather/package-lock.json

      - run: npm ci
      - run: npm run docs:check

      - run: npm ci --prefix gather
      - run: npm run typecheck --prefix gather
      - run: npm run build --prefix gather
